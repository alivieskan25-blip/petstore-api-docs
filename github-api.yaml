/users/{username}/starred:
  get:
    summary: List repositories starred by a user
    description: Returns a list of repositories that the specified user has starred.
    operationId: get-starred-by-user
    tags:
      - activity
    parameters:
      - name: username
        in: path
        required: true
        description: GitHub username
        schema:
          type: string
      - name: per_page
        in: query
        description: Number of results per page
        required: false
        schema:
          type: integer
          default: 30
          maximum: 100
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
          default: 1
      - name: sort
        in: query
        description: The property to sort results by
        required: false
        schema:
          type: string
          enum: [created, updated]
          default: created
      - name: direction
        in: query
        description: The direction to sort results by
        required: false
        schema:
          type: string
          enum: [asc, desc]
          default: desc
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/repository'
      '304':
        description: Not modified
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
      '404':
        description: User not found
    security:
      - github_auth: []
components:
  schemas:
    repository:
      type: object
      properties:
        id:
          type: integer
          description: Unique repository identifier
        name:
          type: string
          description: Repository name
        full_name:
          type: string
          description: Full repository name (owner/name)
        private:
          type: boolean
          description: Whether the repository is private
        html_url:
          type: string
          description: URL to the repository on GitHub
        description:
          type: string
          nullable: true
          description: Repository description
        fork:
          type: boolean
          description: Whether this is a forked repository
        created_at:
          type: string
          format: date-time
          description: Creation date
        updated_at:
          type: string
          format: date-time
          description: Last update date
        stargazers_count:
          type: integer
          description: Number of stars
        language:
          type: string
          nullable: true
          description: Primary programming language
        forks_count:
          type: integer
          description: Number of forks
        open_issues_count:
          type: integer
          description: Number of open issues
        visibility:
          type: string
          description: Repository visibility
        owner:
          type: object
          properties:
            login:
              type: string
              description: Owner's GitHub username
            id:
              type: integer
              description: Owner's unique identifier
            avatar_url:
              type: string
              description: URL to owner's avatar
  securitySchemes:
    github_auth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: GitHub personal access token